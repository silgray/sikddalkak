# main에 push할 때마다: 테스트 통과 -> 빌드 -> GitHub Pages 배포.
# 단위 테스트 + 에디터 브라우저 회귀 스위트가 배포 게이트다 — 깨지면 배포되지 않는다.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만. 진행 중인 런은 취소하지 않는다(프로덕션 배포 관행).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

      # 에디터 회귀 스위트는 실제 MathLive를 헤드리스 Chromium으로 구동한다.
      - run: npx playwright install --with-deps chromium

      - run: npm run test:browser

      - run: npm run build

      # enablement: true — Pages가 아직 활성화 안 된 레포에서 활성화까지 시도한다.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
